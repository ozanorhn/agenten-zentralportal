<div class="min-h-screen bg-surface text-on-surface font-body flex items-start justify-center px-4 py-12">
  <div class="w-full max-w-2xl">

    <!-- Back button -->
    <a routerLink="/" class="inline-flex items-center gap-2 text-sm text-on-surface-variant/60 hover:text-on-surface mb-8 transition-colors">
      <span class="material-symbols-outlined text-base">arrow_back</span>
      Zurück
    </a>

    <!-- Card -->
    <div class="bg-surface-container rounded-2xl border border-outline-variant/20 shadow-[0_8px_32px_rgba(0,0,0,0.12)] overflow-hidden">

      <!-- Header -->
      <div class="px-8 pt-8 pb-6 border-b border-outline-variant/10">
        <div class="flex items-center gap-4 mb-4">
          <div class="w-12 h-12 rounded-xl bg-[#F59E0B]/10 border border-[#F59E0B]/20 flex items-center justify-center">
            <span class="material-symbols-outlined text-[#F59E0B] text-2xl" style="font-variation-settings:'FILL' 1">warning</span>
          </div>
          <div>
            <h1 class="text-xl font-bold text-on-surface font-headline">Fehler / Risiko melden</h1>
            <p class="text-sm text-on-surface-variant/60 mt-0.5">Hilf uns, Probleme schnell zu erkennen und zu beheben.</p>
          </div>
        </div>
      </div>

      <!-- Form -->
      <form (ngSubmit)="submit()" class="px-8 py-8 space-y-6">

        <div class="space-y-2">
          <label class="block text-sm font-semibold text-on-surface">
            Welchen Fehler oder welches Risiko möchtest du melden?
            <span class="text-[#F59E0B] ml-0.5">*</span>
          </label>
          <textarea
            [(ngModel)]="fehlerbeschreibung"
            name="fehlerbeschreibung"
            placeholder="Beschreibe den Fehler oder das Risiko möglichst genau…"
            required
            rows="4"
            class="w-full px-4 py-3 bg-surface-container-high border border-outline-variant/30 rounded-xl
                   text-on-surface placeholder:text-on-surface-variant/30 text-sm
                   focus:outline-none focus:border-[#F59E0B]/60 focus:ring-2 focus:ring-[#F59E0B]/10
                   resize-none transition-all"
          ></textarea>
        </div>

        <div class="space-y-2">
          <label class="block text-sm font-semibold text-on-surface">
            Welcher Prozess ist betroffen?
            <span class="text-[#F59E0B] ml-0.5">*</span>
          </label>
          <input
            type="text"
            [(ngModel)]="betroffenerProzess"
            name="betroffenerProzess"
            placeholder="z.B. E-Mail Sortierung, Reporting…"
            required
            class="w-full px-4 py-3 bg-surface-container-high border border-outline-variant/30 rounded-xl
                   text-on-surface placeholder:text-on-surface-variant/30 text-sm
                   focus:outline-none focus:border-[#F59E0B]/60 focus:ring-2 focus:ring-[#F59E0B]/10
                   transition-all"
          />
        </div>

        <div class="space-y-3">
          <label class="block text-sm font-semibold text-on-surface">
            Wie schnell muss der Fehler behoben werden?
            <span class="text-[#F59E0B] ml-0.5">*</span>
          </label>
          <div class="flex flex-wrap gap-3">
            @for (opt of dringlichkeitOptions; track opt.label) {
              <button
                type="button"
                (click)="selectDringlichkeit(opt.label)"
                [class.border-[#F59E0B]]="dringlichkeit() === opt.label"
                [class.bg-[#F59E0B]/10]="dringlichkeit() === opt.label"
                [class.text-[#F59E0B]]="dringlichkeit() === opt.label"
                class="px-5 py-2.5 rounded-xl border border-outline-variant/30 text-sm font-medium
                       text-on-surface-variant bg-surface-container-high
                       hover:border-[#F59E0B]/50 hover:bg-[#F59E0B]/5 transition-all"
              >{{ opt.label }}</button>
            }
          </div>
        </div>

        <button
          type="submit"
          [disabled]="loading()"
          class="w-full flex items-center justify-center gap-2 px-6 py-3.5 rounded-xl
                 bg-[#F59E0B] text-white font-semibold text-sm
                 hover:bg-[#D97706] active:scale-[0.98]
                 disabled:opacity-50 disabled:cursor-not-allowed transition-all"
        >
          @if (loading()) {
            <span class="material-symbols-outlined text-base animate-spin">progress_activity</span>
            Wird gesendet…
          } @else {
            Fehler melden
            <span class="material-symbols-outlined text-base">arrow_forward</span>
          }
        </button>

      </form>
    </div>
  </div>
</div>
