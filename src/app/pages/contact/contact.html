<div class="min-h-screen bg-surface text-on-surface font-body flex items-start justify-center px-4 py-12">
  <div class="w-full max-w-2xl">

    <!-- Back button -->
    <a routerLink="/" class="inline-flex items-center gap-2 text-sm text-on-surface-variant/60 hover:text-on-surface mb-8 transition-colors">
      <span class="material-symbols-outlined text-base">arrow_back</span>
      Zurück
    </a>

    <!-- Card -->
    <div class="bg-surface-container rounded-2xl border border-outline-variant/20 shadow-[0_8px_32px_rgba(0,0,0,0.12)] overflow-hidden">

      <!-- Header -->
      <div class="px-8 pt-8 pb-6 border-b border-outline-variant/10">
        <div class="flex items-center gap-4 mb-4">
          <div class="w-12 h-12 rounded-xl bg-[#06B6D4]/10 border border-[#06B6D4]/20 flex items-center justify-center">
            <span class="material-symbols-outlined text-[#06B6D4] text-2xl" style="font-variation-settings:'FILL' 1">mail</span>
          </div>
          <div>
            <h1 class="text-xl font-bold text-on-surface font-headline">Kontakt zum KI-Team</h1>
            <p class="text-sm text-on-surface-variant/60 mt-0.5">Fragen, Support oder Feedback? Wir antworten schnell.</p>
          </div>
        </div>
      </div>

      <!-- Form -->
      <form (ngSubmit)="submit()" #contactForm="ngForm" class="px-8 py-8 space-y-6">

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
          <div class="space-y-2">
            <label class="block text-sm font-semibold text-on-surface">
              Name <span class="text-[#06B6D4] ml-0.5">*</span>
            </label>
            <input
              type="text"
              [(ngModel)]="name"
              name="name"
              placeholder="Ihr Name…"
              required
              class="w-full px-4 py-3 bg-surface-container-high border border-outline-variant/30 rounded-xl
                     text-on-surface placeholder:text-on-surface-variant/30 text-sm
                     focus:outline-none focus:border-[#06B6D4]/60 focus:ring-2 focus:ring-[#06B6D4]/10
                     transition-all"
            />
          </div>

          <div class="space-y-2">
            <label class="block text-sm font-semibold text-on-surface">
              E-Mail <span class="text-[#06B6D4] ml-0.5">*</span>
            </label>
            <input
              type="email"
              [(ngModel)]="email"
              name="email"
              placeholder="Ihre@email.de"
              required
              class="w-full px-4 py-3 bg-surface-container-high border border-outline-variant/30 rounded-xl
                     text-on-surface placeholder:text-on-surface-variant/30 text-sm
                     focus:outline-none focus:border-[#06B6D4]/60 focus:ring-2 focus:ring-[#06B6D4]/10
                     transition-all"
            />
          </div>
        </div>

        <div class="space-y-2">
          <label class="block text-sm font-semibold text-on-surface">
            Betreff <span class="text-[#06B6D4] ml-0.5">*</span>
          </label>
          <select
            [(ngModel)]="betreff"
            name="betreff"
            required
            class="w-full px-4 py-3 bg-surface-container-high border border-outline-variant/30 rounded-xl
                   text-on-surface text-sm
                   focus:outline-none focus:border-[#06B6D4]/60 focus:ring-2 focus:ring-[#06B6D4]/10
                   transition-all appearance-none"
          >
            <option value="" disabled selected class="text-on-surface-variant/30">Bitte auswählen…</option>
            <option value="Frage zu einer Automatisierung">Frage zu einer Automatisierung</option>
            <option value="Support / Fehler">Support / Fehler</option>
            <option value="Feedback">Feedback</option>
            <option value="Zusammenarbeit">Zusammenarbeit</option>
            <option value="Sonstiges">Sonstiges</option>
          </select>
        </div>

        <div class="space-y-2">
          <label class="block text-sm font-semibold text-on-surface">
            Nachricht <span class="text-[#06B6D4] ml-0.5">*</span>
          </label>
          <textarea
            [(ngModel)]="nachricht"
            name="nachricht"
            placeholder="Wie können wir Ihnen helfen?…"
            required
            rows="4"
            class="w-full px-4 py-3 bg-surface-container-high border border-outline-variant/30 rounded-xl
                   text-on-surface placeholder:text-on-surface-variant/30 text-sm
                   focus:outline-none focus:border-[#06B6D4]/60 focus:ring-2 focus:ring-[#06B6D4]/10
                   resize-none transition-all"
          ></textarea>
        </div>

        <button
          type="submit"
          [disabled]="loading() || !contactForm.valid"
          class="w-full flex items-center justify-center gap-2 px-6 py-3.5 rounded-xl
                 bg-[#06B6D4] text-white font-semibold text-sm
                 hover:bg-[#0891B2] active:scale-[0.98]
                 disabled:opacity-50 disabled:cursor-not-allowed transition-all"
        >
          @if (loading()) {
            <span class="material-symbols-outlined text-base animate-spin">progress_activity</span>
            Wird gesendet…
          } @else {
            Nachricht senden
            <span class="material-symbols-outlined text-base">arrow_forward</span>
          }
        </button>

      </form>
    </div>
  </div>
</div>
